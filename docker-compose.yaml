version: '3.8'

services:
  # Dynamic Sandbox Orchestration Service
  sandbox:
    build:
      context: ./cli-client
      dockerfile: Dockerfile.sandbox
    image: terminal-academy/sandbox:latest
    container_name: academy-sandbox
    runtime: runsc  # Enforces gVisor userspace virtualization shim
    init: true      # Handles signals properly and prevents zombie processes
    read_only: true # Enforces a read-only root filesystem for extra security
    tty: true
    stdin_open: true
    volumes:
      - ./infra/gvisor_events.sock:/var/run/gvisor_events.sock:rw # Mount gVisor seccheck socket
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=131072k
      - /home/student:rw,noexec,nosuid,size=262144k # Allow minimal home dir storage
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '${SANDBOX_CPU_LIMIT:-0.25}'   # Parameterized CPU limit
          memory: '${SANDBOX_MEM_LIMIT:-512M}' # Parameterized RAM limit
    networks:
      - sandbox-network

  # Microsoft Presidio Sidecar Service for PII Scrubbing
  presidio-sidecar:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: academy-presidio-sidecar
    ports:
      - "5001:5001"
    networks:
      - sandbox-network

networks:
  # Sandbox Tier network: isolated bridge network for telemetry and eBPF integration
  sandbox-network:
    internal: true
    driver: bridge
